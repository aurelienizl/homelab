version: '3.8'

services:
  ## === qBittorrent with VPN === ##
  qbittorrent-vpn:
    image: binhex/arch-qbittorrentvpn
    container_name: qbittorrent-vpn
    privileged: true
    ports:
      - "8080:8080"  # qBittorrent WebUI
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${QBIT_TZ:-America/New_York}
      - VPN_ENABLED=${VPN_ENABLED:-yes}
      - VPN_PROV=${VPN_PROV:-custom}
      - VPN_CLIENT=${VPN_CLIENT:-wireguard}
      - LAN_NETWORK=${LAN_NETWORK:-192.168.1.0/24}
    volumes:
      - /docker/qbittorrent-vpn:/config
      - /media/mymedia:/data  # Ensures torrents are stored in media folder
    restart: unless-stopped
    networks:
      - media-network

  ## === SMB File Sharing (Samba) === ##
  samba:
    image: dperson/samba:latest
    container_name: samba
    restart: unless-stopped
    ports:
      - "137:137/udp"
      - "138:138/udp"
      - "139:139/tcp"
      - "445:445/tcp"
    environment:
      - TZ=${SAMBA_TZ:-Europe/Paris}
    volumes:
      - /media/mymedia:/mount
    command: >
      -u "${SAMBA_USER};${SAMBA_PASSWORD}"
      -s "SharedMedia;/mount;yes;yes;no;${SAMBA_USER}"
    networks:
      - media-network

  ## === File Manager === ##
  filemanager:
    image: filebrowser/filebrowser
    container_name: filemanager
    restart: unless-stopped
    ports:
      - "8081:80"
    volumes:
      - /media/mymedia:/srv
      - /docker/filemanager:/config
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
    networks:
      - media-network

networks:
  media-network:
    driver: bridge

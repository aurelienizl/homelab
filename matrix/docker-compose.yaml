services:
  # Element Web (client)
  element:
    image: vectorim/element-web:latest
    restart: unless-stopped
    ports:
      - "8080:80"   # backend for your reverse proxy (element.domain.tld)
    volumes:
      - ./element/config.json:/app/config.json:ro
    depends_on:
      postgres:
        condition: service_healthy
      synapse:
        condition: service_healthy

  # PostgreSQL for Synapse
  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_INITDB_ARGS=--encoding=UTF8 --locale=C
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Synapse (Matrix homeserver)
  synapse:
    image: matrixdotorg/synapse:latest
    restart: unless-stopped
    ports:
      - "8008:8008"   # backend for your reverse proxy (matrix.domain.tld)
    environment:
      - SYNAPSE_SERVER_NAME=${MATRIX_SERVER_NAME}
      - SYNAPSE_REPORT_STATS=yes
    command: ["run", "-c", "/data/homeserver.yaml", "-c", "/data/extra-config.yaml"]
    volumes:
      - synapse_data:/data
      - ./synapse/extra-config.yaml:/data/extra-config.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8008/_matrix/client/versions || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  synapse_data:
  postgres_data: